name: Daily Column

# 専門コラム（/column）を毎日1記事、Claude Haiku で自動生成して content/column/ に追加する。
# お知らせ（/news・WordPress管理）には一切触れない。

on:
  schedule:
    # 毎日 10:20 JST（= 01:20 UTC）
    - cron: "20 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-column
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate daily column
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 未設定ならスクリプト側のデフォルト（claude-haiku-4-5-20251001）が使われる
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: npx -y tsx scripts/generate-daily-column.ts

      - name: Commit and push
        run: |
          git config user.name "haruju-column-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content/column
          if git diff --cached --quiet; then
            echo "変更なし（新規記事なし）— 正常終了します"
            exit 0
          fi
          NEW_FILES=$(git diff --cached --name-only)
          echo "コミット対象: $NEW_FILES"
          git commit -m "chore(column): 専門コラムを自動追加 [skip actions]" -m "$NEW_FILES"
          git push
          echo "push 完了: $NEW_FILES"
